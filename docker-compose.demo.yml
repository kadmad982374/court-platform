# ============================================================
# docker-compose.demo.yml
# Demo deployment: PostgreSQL + Spring Boot backend + Nginx/React frontend
#
# Usage:
#   cp .env.demo.example .env.demo
#   docker compose -f docker-compose.demo.yml --env-file .env.demo up -d
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sla_demo}
      POSTGRES_USER: ${DB_USER:-sla}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sla} -d ${DB_NAME:-sla_demo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-sla_demo}
      DB_USER: ${DB_USER:-sla}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SLA_JWT_SECRET: ${SLA_JWT_SECRET:?SLA_JWT_SECRET is required}
      SLA_BOOTSTRAP_ADMIN_ENABLED: "true"
      SLA_BOOTSTRAP_ADMIN_PASSWORD: ${SLA_BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe!2026}
      SLA_ATTACHMENTS_BASE_DIR: /app/attachments-data
      SERVER_PORT: 8080
    volumes:
      - attachments-data:/app/attachments-data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v3/api-docs > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Nginx + React Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${DEMO_PORT:-80}:80"

volumes:
  db-data:
    name: sla-demo-db
  attachments-data:
    name: sla-demo-attachments


